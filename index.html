<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zijian Zhang | Beijing Institute of Technology</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="assets/css/main.css" rel="stylesheet" />
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <div class="avatar-container">
                    <img alt="Zijian Zhang" class="avatar" src="assets/images/profile/zijian-zhang.jpeg" />
                </div>
                <h1 id="sidebar-name"></h1>
                <p class="role" id="sidebar-role"></p>
                <p class="uni" id="sidebar-university"></p>
                <div class="social-links" id="sidebar-social-links"></div>
            </div>
            <nav aria-label="Section navigation" class="nav-menu">
                <ul>
                    <li><a class="active" href="#profile"><i class="fas fa-user"></i> Profile</a></li>
                    <li><a href="#news"><i class="fas fa-bell"></i> News</a></li>
                    <li><a href="#experience"><i class="fas fa-briefcase"></i> Experience</a></li>
                    <li><a href="#publications"><i class="fas fa-file-alt"></i> Publications</a></li>
                    <li><a href="#awards"><i class="fas fa-trophy"></i> Awards</a></li>
                    <li><a href="#fundings"><i class="fas fa-hand-holding-usd"></i> Fundings</a></li>
                    <li><a href="#services"><i class="fas fa-users"></i> Services</a></li>
                    <li><a href="#students"><i class="fas fa-user-graduate"></i> Students</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p id="sidebar-copyright"></p>
            </div>
        </div>
    </aside>
    <main class="main-content">
        <section class="section fade-in" id="profile">
            <div class="section-header">
                <h2>Biography</h2>
                <div class="header-line"></div>
            </div>
            <div class="bio-content">
                <p class="lead-text" id="profile-lead"></p>
                <p id="profile-bio"></p>
            </div>
        </section>
        <section class="section" id="news">
            <div class="section-header">
                <h2>News</h2>
                <div class="header-line"></div>
            </div>
            <div class="alert-box">
                <div class="alert-icon"><i class="fas fa-bullhorn"></i></div>
                <div class="alert-content" id="news-open-positions"></div>
            </div>
            <div class="scroll-container news-window">
                <ul class="timeline" id="news-timeline"></ul>
            </div>
        </section>
        <section class="section" id="experience">
            <div class="section-header">
                <h2>Experience</h2>
                <div class="header-line"></div>
            </div>
            <div class="experience-timeline" id="experience-list"></div>
        </section>
        <section class="section" id="publications">
            <div class="section-header">
                <h2>Selected Publications</h2>
                <div class="header-line"></div>
            </div>
            <div class="pub-section-block">
                <h3><i class="fas fa-book"></i> Monograph</h3>
                <div class="pub-list-container" id="monograph-list"></div>
            </div>
            <div class="pub-section-block">
                <h3><i class="fas fa-layer-group"></i> Conference &amp; Journal Papers</h3>
                <div class="pub-list-container" id="papers-list"></div>
            </div>
        </section>
        <section class="section" id="awards">
            <div class="section-header">
                <h2>Honors &amp; Awards</h2>
                <div class="header-line"></div>
            </div>
            <ul class="award-list" id="awards-list"></ul>
            <div class="gallery-grid" id="awards-gallery"></div>
        </section>
        <section class="section" id="fundings">
            <div class="section-header">
                <h2>Research Grants</h2>
                <div class="header-line"></div>
            </div>
            <ul class="styled-list" id="fundings-list"></ul>
        </section>
        <section class="section" id="services">
            <div class="section-header">
                <h2>Services</h2>
                <div class="header-line"></div>
            </div>
            <div class="services-grid-top" id="services-grid-top"></div>
            <div class="services-grid-bottom" id="services-grid-bottom"></div>
        </section>
        <section class="section" id="students">
            <div class="section-header">
                <h2>Students</h2>
                <div class="header-line"></div>
            </div>
            <div class="scroll-container students-window" id="students-groups"></div>
        </section>
        <footer class="footer">
            <p id="main-footer-text"></p>
        </footer>
    </main>
    <script defer="" src="assets/js/main.js"></script>
</body>

</html>
